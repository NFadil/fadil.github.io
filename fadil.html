<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini VS Code + YouTube</title>
  <style>
    body {
      margin: 0;
      font-family: monospace;
      display: flex;
      height: 100vh;
      background: #1e1e1e;
      color: white;
    }

    .editor {
      width: 70%;
      padding: 10px;
      background: #1e1e1e;
      border-right: 2px solid #333;
    }

    textarea {
      width: 100%;
      height: 100%;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      outline: none;
      font-size: 14px;
      resize: none;
    }

    .youtube {
      width: 30%;
      display: flex;
      flex-direction: column;
      background: #111;
    }

    .input-box {
      padding: 10px;
      border-bottom: 1px solid #333;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: black;
    }
  </style>
</head>
<body>

  <div class="editor">
    <textarea placeholder="Ketik kode di sini seperti VS Code..."></textarea>
  </div>

  <div class="youtube">
    <div class="input-box">
      <input type="text" id="ytLink" placeholder="Paste link YouTube di sini lalu tekan Enter">
    </div>
    <iframe id="player" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
  </div>

  <script>
    const input = document.getElementById('ytLink');
    const player = document.getElementById('player');

    function cleanVideoId(id) {
      return id ? id.split('?')[0].split('&')[0] : null;
    }

    function getVideoId(url) {
      try {
        const parsed = new URL(url);

        if (parsed.hostname.includes('youtube.com')) {
          return cleanVideoId(parsed.searchParams.get('v'));
        }

        if (parsed.hostname.includes('youtu.be')) {
          return cleanVideoId(parsed.pathname.slice(1));
        }

        return null;
      } catch (e) {
        return null;
      }
    }

    function loadVideo(url) {
      const videoId = getVideoId(url);

      if (!videoId) {
        alert('Link tidak valid');
        return;
      }

      const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&mute=1&rel=0&modestbranding=1`;

      player.src = embedUrl;
      player.referrerPolicy = "strict-origin-when-cross-origin";

      // fallback kalau gagal (misal kena restriction)
      setTimeout(() => {
        if (!player.src.includes(videoId)) return;
        // kalau user klik dan masih gagal, buka di tab baru
        player.onclick = () => window.open(url, '_blank');
      }, 2000);
    }

    // tekan enter
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        loadVideo(input.value.trim());
      }
    });

    // auto paste langsung play
    input.addEventListener('paste', function(e) {
      setTimeout(() => {
        loadVideo(input.value.trim());
      }, 100);
    });
  </script>

</body>
</html>
