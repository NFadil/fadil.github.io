<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fadil Code</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      background: #1e1e1e;
      color: white;
      font-family: monospace;
    }

    .sidebar {
      width: 220px;
      background: #252526;
      padding: 10px;
      font-size: 13px;
    }

    .folder { color: #dcdcaa; margin-top: 5px; }
    .file { color: #9cdcfe; margin-left: 15px; }

    .editor {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
      background: #2d2d2d;
      padding: 5px;
      gap: 5px;
    }

    .tab {
      background: #3c3c3c;
      padding: 5px 10px;
      border-radius: 5px 5px 0 0;
      font-size: 12px;
    }

    #editorContainer {
      flex: 1;
    }

    /* YouTube */
    .youtube {
      position: fixed;
      bottom: 10px;
      left: 10px;
      width: 300px;
      height: 200px;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 9999;
      transition: all 0.3s ease;
    }

    .top-bar {
      display: flex;
      background: rgba(0,0,0,0.6);
      padding: 3px;
      gap: 4px;
    }

    .top-bar input {
      flex: 1;
      font-size: 10px;
    }

    .btn {
      background: #222;
      color: white;
      border: none;
      padding: 2px 6px;
      cursor: pointer;
    }

    iframe {
      flex: 1;
      border: none;
    }

    .youtube.hidden {
      display: none;
    }

    /* Tombol global */
    .global-toggle {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 10000;
      background: #222;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- ✅ TOMBOL GLOBAL (CUMA 1) -->
<button class="global-toggle" id="toggleGlobal">🎬</button>

<!-- Sidebar -->
<div class="sidebar">
  <div class="folder">📁 src</div>
  <div class="file">📄 app.js</div>
  <div class="file">📄 helper.js</div>

  <div class="folder">📁 public</div>
  <div class="file">📄 index.html</div>
  <div class="file">📄 style.css</div>

  <div class="folder">📁 config</div>
  <div class="file">📄 db.js</div>

  <div class="folder">📁 node_modules</div>
  <div class="file">📄 (banyak file...)</div>
</div>

<!-- Editor -->
<div class="editor">
  <div class="tabs">
    <div class="tab">app.js</div>
  </div>

  <div id="editorContainer"></div>
</div>

<!-- YouTube -->
<div class="youtube" id="ytBox">
  <div class="top-bar">
    <input type="text" id="ytLink" placeholder="Paste link">
    <button class="btn" id="minus">-</button>
    <button class="btn" id="plus">+</button>
  </div>
  <iframe id="player"></iframe>
</div>

<!-- MONACO -->
<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

<script>
require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' }});

require(['vs/editor/editor.main'], function () {
  monaco.editor.create(document.getElementById('editorContainer'), {
    value: `// Contoh kode
// Contoh kode

function helloWorld() {
  console.log("Hello Sahabat Fadil VS Code Style!");
}
const { Op, fn, col } = require('sequelize');
const dayjs = require('dayjs');

exports.index = async (req, res) => {
  const userId = req.user.id;

  // =========================
  // GROUP USER
  // =========================
  const userGroups = await ChecklistGroupAccess.findAll({
    where: { user_id: userId },
    attributes: ['group_id'],
    raw: true
  });

  const groupIds = userGroups.map(g => g.group_id);

  const groupUsers = await ChecklistGroupAccess.findAll({
    where: { group_id: { [Op.in]: groupIds } },
    attributes: ['user_id'],
    raw: true
  });

  const groupUserIds = groupUsers.map(u => u.user_id);

  const now = dayjs();
  const today = now.format('YYYY-MM-DD');
  const todayDay = now.date();
  const todayWeek = now.isoWeekday();

  // =========================
  // LAST ANSWERS
  // =========================
  const lastAnswersRaw = await ChecklistAnswer.findAll({
    where: { user_id: { [Op.in]: groupUserIds } },
    attributes: [
      'category_id',
      [fn('MAX', col('created_at')), 'last_filled']
    ],
    group: ['category_id'],
    raw: true
  });

  const lastAnswers = {};
  lastAnswersRaw.forEach(r => {
    lastAnswers[r.category_id] = r.last_filled;
  });

  // =========================
  // GROUP LOCATION
  // =========================
  const groupLocationsRaw = await ChecklistGroup.findAll({
    where: { id: { [Op.in]: groupIds } },
    attributes: ['id', 'location_id'],
    raw: true
  });

  const groupLocations = {};
  groupLocationsRaw.forEach(g => {
    groupLocations[g.id] = g.location_id;
  });

  // =========================
  // CATEGORY
  // =========================
  const categories = await ChecklistCategory.findAll({
    include: [
      {
        model: ChecklistCategoryGroup,
        where: { group_id: { [Op.in]: groupIds } }
      },
      {
        model: ChecklistPeriod
      },
      {
        model: ChecklistPeriodRules,
        required: false
      }
    ],
    where: {
      period_start: { [Op.lte]: today },
      [Op.or]: [
        { period_end: null },
        { period_end: { [Op.gte]: today } }
      ]
    }
  });

  // =========================
  // ASSET COUNT
  // =========================
  const assetCounts = await Asset.findAll({
    where: { is_disposal: 0 },
    attributes: [
      'id_category',
      'id_location',
      [fn('COUNT', col('*')), 'total']
    ],
    group: ['id_category', 'id_location'],
    raw: true
  });

-
  // =========================
  // MAX FILL
  // =========================
  categories.forEach(cat => {
    if (!cat.category_asset_id) {
      cat.dataValues.max_fill = 1;
      return;
    }

    const groupId = cat.ChecklistCategoryGroups?.[0]?.group_id;
    const locationId = groupLocations[groupId];

 
  });

  // =========================
  // FILL COUNTS
  // =========================
  const answers = await ChecklistAnswer.findAll({
    where: {
      user_id: { [Op.in]: groupUserIds },
      fill_key: { [Op.ne]: null }
    },
    include: [
      {
        model: ChecklistQuestion,
        include: [
          {
            model: ChecklistCategory,
            include: [ChecklistPeriod]
          }
        ]
      }
    ]
  });

  const fillCounts = {};

  answers.forEach(a => {
    const cat = a.ChecklistQuestion.ChecklistCategory;
    const period = cat.ChecklistPeriod.period_name;

    const created = dayjs(a.created_at);

    let valid = false;

    if (period === 'daily') {
      valid = created.format('YYYY-MM-DD') === today;
    }

    if (period === 'weekly') {
      valid = created.isoWeek() === now.isoWeek();
    }

    if (period === 'monthly') {
      valid = created.month() === now.month() && created.year() === now.year();
    }

    if (valid) {
      fillCounts[cat.id] = (fillCounts[cat.id] || 0) + 1;
    }
  });

  // =========================
  // FILTER FINAL
  // =========================
  const finalCategories = categories.filter(cat => {
    const filled = fillCounts[cat.id] || 0;

    if (filled >= (cat.dataValues.max_fill || 1)) return false;

    const period = cat.ChecklistPeriod.period_name;

    if (period === 'daily') return true;

    if (period === 'weekly') {
      if (!cat.start_day_of_week) return true;
      return todayWeek >= cat.start_day_of_week && todayWeek <= cat.end_day_of_week;
    }

    if (period === 'monthly') {
      if (!cat.start_day_of_month) return true;
      return todayDay >= cat.start_day_of_month && todayDay <= cat.end_day_of_month;
    }

    return false;
  });

  return res.render('checklist/category', {
    categories: finalCategories
  });
};
`,
    language: 'javascript',
    theme: 'vs-dark',
    fontSize: 14
  });
});

/* =========================
   YOUTUBE LOGIC
========================= */
const input = document.getElementById('ytLink');
const player = document.getElementById('player');
const ytBox = document.getElementById('ytBox');
const toggleGlobal = document.getElementById('toggleGlobal');
const plus = document.getElementById('plus');
const minus = document.getElementById('minus');

let width = 300;

// ambil video id
function getVideoId(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('youtube.com')) return u.searchParams.get('v');
    if (u.hostname.includes('youtu.be')) return u.pathname.slice(1);
  } catch {}
  return null;
}

// load video
function loadVideo(url) {
  const id = getVideoId(url);
  if (!id) return;
  player.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&mute=1`;
}

// resize
function resizeBox() {
  const height = Math.round(width * 9 / 16) + 25;
  ytBox.style.width = width + 'px';
  ytBox.style.height = height + 'px';
}

// tombol +
plus.onclick = () => {
  width += 50;
  resizeBox();
};

// tombol -
minus.onclick = () => {
  width = Math.max(200, width - 50);
  resizeBox();
};

// toggle hide
toggleGlobal.onclick = () => {
  ytBox.classList.toggle('hidden');
};

// enter load video
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') loadVideo(input.value);
});

document.addEventListener('keydown', (e) => {
  // pastikan tidak mengganggu saat ngetik di input
  if (document.activeElement === input) return;

  if (e.code === 'NumpadAdd') {
    width += 50;
    resizeBox();
  }

  if (e.code === 'NumpadSubtract') {
    width = Math.max(200, width - 50);
    resizeBox();
  }
});
// =========================
// RIGHT CLICK = TOGGLE YOUTUBE
// =========================
document.addEventListener('contextmenu', (e) => {
  e.preventDefault(); // matikan menu klik kanan browser
  toggleGlobal.click(); // trigger tombol 🎬
});
</script>

</body>
</html>
